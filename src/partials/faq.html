<section class="faq" id="faq">
  <div class="container faq-container">
    <p class="faq-label">FAQ</p>
    <div class="faq-content">
      <h2 class="faq-title">Quick answers</h2>
      <ul class="faq-list">
        <li class="faq-item">
          <button
            class="faq-question"
            type="button"
            aria-expanded="false"
            aria-controls="faq-answer-1"
          >
            <span>Is the game strategy-focused?</span>
            <span class="faq-icon" aria-hidden="true">
              <svg class="faq-icon-left" width="14" height="29">
                <use href="./icons/sprite.svg#faq-plus"></use>
              </svg>
              <svg class="faq-icon-plus" width="26" height="26">
                <use href="./icons/sprite.svg#faq-minus"></use>
              </svg>
            </span>
          </button>
          <p class="faq-answer" id="faq-answer-1">
            Absolutely! You really need to think about where you place your
            towers.
          </p>
        </li>
        <li class="faq-item">
          <button
            class="faq-question"
            type="button"
            aria-expanded="false"
            aria-controls="faq-answer-2"
          >
            <span>Do enemies vary?</span>
            <span class="faq-icon" aria-hidden="true">
              <svg class="faq-icon-left" width="14" height="29">
                <use href="./icons/sprite.svg#faq-plus"></use>
              </svg>
              <svg class="faq-icon-plus" width="26" height="26">
                <use href="./icons/sprite.svg#faq-minus"></use>
              </svg>
            </span>
          </button>
          <p class="faq-answer" id="faq-answer-2">
            Yes. New types appear as you progress.
          </p>
        </li>
        <li class="faq-item">
          <button
            class="faq-question"
            type="button"
            aria-expanded="false"
            aria-controls="faq-answer-3"
          >
            <span>Are upgrades important?</span>
            <span class="faq-icon" aria-hidden="true">
              <svg class="faq-icon-left" width="14" height="29">
                <use href="./icons/sprite.svg#faq-plus"></use>
              </svg>
              <svg class="faq-icon-plus" width="26" height="26">
                <use href="./icons/sprite.svg#faq-minus"></use>
              </svg>
            </span>
          </button>
          <p class="faq-answer" id="faq-answer-3">
            Yes. They are essential for survival.
          </p>
        </li>
        <li class="faq-item">
          <button
            class="faq-question"
            type="button"
            aria-expanded="false"
            aria-controls="faq-answer-4"
          >
            <span>Can I replay levels?</span>
            <span class="faq-icon" aria-hidden="true">
              <svg class="faq-icon-left" width="14" height="29">
                <use href="./icons/sprite.svg#faq-plus"></use>
              </svg>
              <svg class="faq-icon-plus" width="26" height="26">
                <use href="./icons/sprite.svg#faq-minus"></use>
              </svg>
            </span>
          </button>
          <p class="faq-answer" id="faq-answer-4">
            Yes. To improve your strategy.
          </p>
        </li>
        <li class="faq-item">
          <button
            class="faq-question"
            type="button"
            aria-expanded="false"
            aria-controls="faq-answer-5"
          >
            <span>Is it beginner-friendly?</span>
            <span class="faq-icon" aria-hidden="true">
              <svg class="faq-icon-left" width="14" height="29">
                <use href="./icons/sprite.svg#faq-plus"></use>
              </svg>
              <svg class="faq-icon-plus" width="26" height="26">
                <use href="./icons/sprite.svg#faq-minus"></use>
              </svg>
            </span>
          </button>
          <p class="faq-answer" id="faq-answer-5">
            Yes. It starts simple and builds complexity.
          </p>
        </li>
      </ul>
    </div>
  </div>
</section>
